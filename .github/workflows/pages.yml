name: Publish public presentation

on:
  workflow_dispatch:
    inputs:
      confirm_public:
        description: Type PUBLISH to confirm that this presentation may become public
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce publication gate
        shell: bash
        env:
          CONFIRM_PUBLIC: ${{ inputs.confirm_public }}
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          if [[ "$GITHUB_REPOSITORY_OWNER" != "STP-Lib" ]]; then
            echo "Publication is restricted to STP-Lib." >&2
            exit 1
          fi
          if [[ ! "$repo" =~ ^[0-9]{6}_[A-Z0-9]+_[A-Z0-9]+$ ]]; then
            echo "Repository name must match YYMMDD_<TOPIC>_<VENUE>." >&2
            exit 1
          fi
          if [[ "$CONFIRM_PUBLIC" != "PUBLISH" ]]; then
            echo "Public publication requires the exact confirmation PUBLISH." >&2
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/configure-pages@v5
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm check
      - run: pnpm build:public
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
